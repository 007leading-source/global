<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inventory Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: #111;
      color: white;
      padding: 15px 25px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    h3 {
      margin-top: 0;
    }

    ul {
      padding-left: 18px;
    }

    li {
      margin-bottom: 8px;
    }

    .danger {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>📦 Inventory Dashboard</header>

<div class="container">

  <div class="grid">

    <!-- CHART -->
    <div class="card">
      <h3>Stock Overview</h3>
      <canvas id="chart"></canvas>
    </div>

    <!-- SIDE LISTS -->
    <div>
      <div class="card">
        <h3>Out of Stock</h3>
        <ul id="outOfStock"></ul>
      </div>

      <div class="card" style="margin-top:20px;">
        <h3>Need to Order</h3>
        <ul id="needOrder"></ul>
      </div>
    </div>

  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwnPCIoNap3W-lZcPN8IB1muBno88jDUhutHZ-PS6jMiUeVoPSKvBzvn2EMr1-8ARao/exec";

let chart;

// ======================
// LOAD DATA
// ======================
async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    console.log("DATA:", data); // debug

    processData(data);

  } catch (err) {
    console.error("ERROR:", err);
    alert("Error loading data. Check console.");
  }
}

// ======================
// PROCESS DATA
// ======================
function processData(data) {
  const labels = [];
  const values = [];
  const colors = [];

  const outOfStock = [];
  const needOrder = [];

  data.forEach(p => {
    labels.push(p.producto);
    values.push(p.cantidad);

    if (p.lowStock) {
      colors.push("red");
      needOrder.push(p.producto);
    } else {
      colors.push("#4CAF50");
    }

    if (p.outOfStock) {
      outOfStock.push(p.producto);
    }
  });

  renderChart(labels, values, colors);
  renderList("outOfStock", outOfStock, true);
  renderList("needOrder", needOrder, false);
}

// ======================
// CHART
// ======================
function renderChart(labels, data, colors) {
  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Cantidad",
        data,
        backgroundColor: colors,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: { beginAtZero: true }
      }
    }
  });
}

// ======================
// LISTS
// ======================
function renderList(id, items, highlight) {
  const el = document.getElementById(id);
  el.innerHTML = "";

  if (items.length === 0) {
    el.innerHTML = "<li>None</li>";
    return;
  }

  items.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;

    if (highlight) li.classList.add("danger");

    el.appendChild(li);
  });
}

// ======================
// INIT
// ======================
loadData();
</script>

</body>
</html>
