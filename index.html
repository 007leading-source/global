<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="app">

<!-- HOME -->
<section id="home" class="screen active">
<h1>POS</h1>
<button onclick="goTo('inventory')">Inventario</button>
<button onclick="goTo('sale')">Nueva Venta</button>
<button onclick="goTo('customer')">Nuevo Cliente</button>
</section>

<!-- INVENTARIO -->
<section id="inventory" class="screen">
<button onclick="goTo('home')">←</button>

<h2>Inventario</h2>

<button onclick="openProductForm()">+ Nuevo Producto</button>

<div class="card">
<h3>Valor Inventario</h3>
<p id="inventoryValue">$0</p>
</div>

<div class="card">
<h4>Stock Bajo</h4>
<ul id="lowStock"></ul>
</div>

<div class="card">
<h4>Sin Stock</h4>
<ul id="outStock"></ul>
</div>

<h3 id="chartTitle"></h3>
<button onclick="toggleChartMode()">Cambiar Modo</button>
<canvas id="chart"></canvas>

<input id="searchInput" placeholder="Buscar..." oninput="filterProducts(this.value)">

<table>
<thead>
<tr>
<th onclick="sort('Name')">Nombre</th>
<th onclick="sort('Stock')">Stock</th>
<th>Min</th>
<th>Costo</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="productsTable"></tbody>
</table>

</section>

<!-- VENTA -->
<section id="sale" class="screen">
<button onclick="goTo('home')">←</button>

<h2>Nueva Venta</h2>

<input id="saleSearch" placeholder="Buscar producto..." oninput="searchProducts(this.value)">
<div id="searchResults"></div>

<h3>Carrito</h3>
<div id="cart"></div>

<h3>Cliente</h3>
<select id="customerSelect"></select>

<h3>Totales</h3>
<p>Subtotal: $<span id="subtotal">0</span></p>
<p>Descuento: <input id="discount" value="0" oninput="updateTotals()"></p>
<p>IVA: $<span id="iva">0</span></p>
<h2>Total: $<span id="total">0</span></h2>

<button onclick="createSale()">Generar Venta</button>
</section>

<!-- CLIENTE -->
<section id="customer" class="screen">
<button onclick="goTo('home')">←</button>

<h2>Nuevo Cliente</h2>

<input id="cName" placeholder="Nombre">
<input id="cPhone" placeholder="Teléfono">
<input id="cEmail" placeholder="Email">
<input id="cAddress" placeholder="Dirección">
<input id="cRFC" placeholder="RFC">
<input id="cNotes" placeholder="Notas">

<button onclick="createCustomer()">Guardar Cliente</button>
</section>

</div>

<!-- MODAL -->
<div id="productModal" class="modal hidden">
<div class="modal-content">

<h3>Nuevo Producto</h3>

<input id="pName" placeholder="Nombre">
<input id="pBrand" placeholder="Marca">
<input id="pModel" placeholder="Modelo">
<input id="pCategory" placeholder="Categoría">
<input id="pUnit" placeholder="Unidad">
<input id="pCost" placeholder="Costo">
<input id="pPrice" placeholder="Precio">
<input id="pStock" placeholder="Stock">
<input id="pMinStock" placeholder="Min Stock">
<input id="pSupplier" placeholder="Proveedor">
<input id="pDesc" placeholder="Descripción">

<button onclick="createProduct()">Guardar</button>
<button onclick="closeProductForm()">Cancelar</button>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
